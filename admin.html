<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель | Grand Reserve</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>#admin-content { display: none; }</style>
</head>
<body class="admin-body">
    <script>
        const PASS = "1234"; // ЗМІНИ ПАРОЛЬ ТУТ
        window.onload = () => {
            if (sessionStorage.getItem('access') === PASS) {
                document.getElementById('admin-content').style.display = 'block';
            } else {
                let p = prompt("Введіть пароль:");
                if (p === PASS) {
                    sessionStorage.setItem('access', p);
                    document.getElementById('admin-content').style.display = 'block';
                } else {
                    alert("Відмовлено");
                    window.location.href = "index.html";
                }
            }
        };
    </script>

    <div id="admin-content">
        <div class="admin-container wide">
            <h2>Керування товарами</h2>
            <form id="admin-form">
                <input type="hidden" id="edit-id">
                <input type="text" id="admin-name" placeholder="Назва" required>
                <input type="number" id="admin-price" placeholder="Ціна" required>
                <input type="text" id="admin-img" placeholder="URL картинки (PNG)" required>
                <textarea id="admin-desc" placeholder="Опис..."></textarea>
                <select id="admin-category">
                    <option value="whisky">Віскі</option>
                    <option value="wine">Вино</option>
                    <option value="cognac">Коньяк</option>
                </select>
                <button type="submit" id="admin-submit-btn" class="btn-gold-filled">ЗБЕРЕГТИ</button>
            </form>
            <div id="admin-product-list" class="admin-list" style="margin-top:20px;"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
