<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмінка | Grand Reserve</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div class="admin-container wide">
        <h2>Керування товарами</h2>
        <form id="admin-form">
            <input type="hidden" id="edit-id">
            <input type="text" id="admin-name" placeholder="Назва" required>
            <input type="number" id="admin-price" placeholder="Ціна" required>
            <input type="text" id="admin-img" placeholder="URL картинки" required>
            <textarea id="admin-desc" placeholder="Опис товару..." rows="4"></textarea>
            <select id="admin-category">
                <option value="whisky">Віскі</option>
                <option value="wine">Вино</option>
                <option value="cognac">Коньяк</option>
            </select>
            <button type="submit" id="admin-submit-btn" class="btn-gold-filled">ОПУБЛІКУВАТИ</button>
        </form>

        <div id="admin-product-list" class="admin-list" style="margin-top:30px;"></div>
        <br>
        <a href="index.html" style="color:var(--gold);">← Повернутися на сайт</a>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
