<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-центр | Grand Reserve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <div id="admin-shield" style="display:none;">
        <div class="admin-container wide">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--gold);">Керування магазином</h2>
                <button id="logout-btn" class="btn-gold">Вийти</button>
            </div>
            <form id="admin-form" style="background:#111; padding:20px; border:1px solid #333; margin-top:20px;">
                <input type="hidden" id="edit-id">
                <input type="text" id="admin-name" placeholder="Назва товару" required>
                <input type="number" id="admin-price" placeholder="Ціна (грн)" required>
                <input type="text" id="admin-img" placeholder="URL картинки (PNG)" required>
                <textarea id="admin-desc" placeholder="Опис товару..."></textarea>
                <select id="admin-category">
                    <option value="whisky">Віскі</option>
                    <option value="wine">Вино</option>
                    <option value="cognac">Коньяк</option>
                </select>
                <button type="submit" id="admin-submit-btn" class="btn-gold-filled">ЗБЕРЕГТИ</button>
            </form>
            <div id="admin-product-list" class="admin-list" style="margin-top:30px;"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
