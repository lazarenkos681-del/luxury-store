<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Адмін-панель | Grand Reserve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">GRAND RESERVE</a></div>
        <ul class="nav-links"><li><a href="index.html">На сайт</a></li></ul>
    </nav>

    <div class="admin-container">
        <div class="admin-card">
            <h3>Додати товар</h3>
            <form id="add-product-form">
                <div class="form-grid">
                    <input type="text" id="prod-name" placeholder="Назва" required>
                    <input type="number" id="prod-price" placeholder="Ціна" required>
                    <select id="prod-category" required>
                        <option value="whisky">Віскі</option>
                        <option value="wine">Вино</option>
                        <option value="cognac">Коньяк</option>
                    </select>
                    <input type="text" id="prod-img" placeholder="URL фото">
                </div>
                <button type="submit" class="btn-gold-filled">Опублікувати</button>
            </form>
        </div>

        <h3 style="color:var(--gold); margin-bottom:20px;">Асортимент</h3>
        <div id="list-whisky"><h4>🥃 Віскі</h4></div>
        <div id="list-wine"><h4>🍷 Вино</h4></div>
        <div id="list-cognac"><h4>🍸 Коньяк</h4></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
