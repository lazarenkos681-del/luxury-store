<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація | Grand Reserve</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">GRAND RESERVE</div>
            <div class="gold-divider"></div>
            <h2>Вхід в адмін-панель</h2>
            
            <form id="login-form" class="admin-form">
                <div class="input-group">
                    <label>Електронна пошта</label>
                    <input type="email" id="login-email" placeholder="admin@grandreserve.com" required>
                </div>
                
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                
                <div id="auth-error" class="error-msg"></div>
                
                <button type="submit" class="btn-gold-filled">Увійти</button>
            </form>
            
            <a href="index.html" class="back-link">← Повернутися на сайт</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
