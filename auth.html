<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація | Grand Reserve</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <nav>
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">GRAND RESERVE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">На головну</a></li>
        </ul>
    </nav>

    <div class="admin-container" style="max-width: 400px; margin: 80px auto; padding: 40px; background: #111; border: 1px solid #333; text-align: center; border-radius: 8px;">
        
        <div class="auth-logo" style="margin-bottom: 25px;">
            <img src="logo.png" alt="Grand Reserve" style="width: 80px; height: auto; filter: drop-shadow(0 0 5px rgba(212,175,55,0.5));">
        </div>

        <h2 id="auth-title" style="color:var(--gold); margin-bottom: 20px; font-family: 'Playfair Display';">Вхід у кабінет</h2>
        
        <form id="auth-form">
            <input type="email" id="auth-email" placeholder="Email" required style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; color:white; border-radius: 4px;">
            <input type="password" id="auth-pass" placeholder="Пароль" required style="width:100%; padding:12px; margin-bottom:20px; background:#222; border:1px solid #444; color:white; border-radius: 4px;">
            <button type="submit" id="auth-submit-btn" class="btn-gold-filled" style="width: 100%; cursor: pointer;">УВІЙТИ</button>
        </form>

        <p style="text-align: center; margin-top: 25px; font-size: 14px; color: #888;">
            <span id="auth-toggle-text">Ще не маєте акаунту?</span> 
            <a href="#" id="auth-toggle-btn" style="color: var(--gold); text-decoration: none; font-weight: 600; margin-left: 5px;">Зареєструватися</a>
        </p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
