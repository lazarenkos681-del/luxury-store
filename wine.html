<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вино | Grand Reserve</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">GRAND RESERVE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Все</a></li>
            <li><a href="whisky.html">Віскі</a></li>
            <li><a href="wine.html" class="active">Вино</a></li>
            <li><a href="cognac.html">Коньяк</a></li>
            <li><a href="about.html">Про нас</a></li>
        </ul>
        <div class="cart-container">
            <div class="cart-status" id="cart-btn">КОШИК (<span id="cart-count">0</span>)</div>
            <div class="cart-dropdown" id="cart-dropdown">
                <h3>Кошик</h3>
                <div id="cart-items"></div>
                <div class="cart-total">Разом: <span id="cart-total-price">0</span> ₴</div>
                <button class="btn-gold-filled" onclick="openCheckout()">ОФОРМИТИ</button>
            </div>
        </div>
    </nav>

    <main id="catalog" style="margin-top: 120px;">
        <h2 class="section-title">Вишукані Вина</h2>
        <div class="products-grid" id="product-list">
            </div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html">Про нас</a>
            <a href="policy.html">Політика конфіденційності</a>
        </div>
        <p>© 2026 Grand Reserve. Надмірне споживання алкоголю шкодить здоров'ю.</p>
    </footer>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <h2>Оформлення замовлення</h2>
            <form id="checkout-form">
                <input type="text" placeholder="Ваше ім'я" required>
                <input type="tel" placeholder="Телефон" required>
                <button type="submit" class="btn-gold-filled">ПІДТВЕРДИТИ</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
